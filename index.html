<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Pagamentos</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --border: #e5e7eb;
      --shadow: 0 10px 25px rgba(0,0,0,0.08);
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px 16px 40px;
    }

    .container { max-width: 700px; margin: 0 auto; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: #0f172a; }
    .subtitulo { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    button:hover  { opacity: .88; }
    button:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; }

    .busca {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .busca:focus { border-color: var(--primary); }

    .resumo {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .box {
      border-radius: 12px;
      padding: 14px;
      background: #f9fafb;
      border: 1px solid var(--border);
    }
    .box.pagos     { background: var(--success-bg); border-color: #bbf7d0; }
    .box.pendentes { background: var(--danger-bg);  border-color: #fecaca; }

    .box .titulo {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .box .valor { font-size: 1.5rem; font-weight: 700; color: #0f172a; }

    .lista { display: grid; gap: 8px; }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      transition: box-shadow .15s, transform .15s;
    }
    .item:hover { box-shadow: 0 4px 14px rgba(0,0,0,.07); transform: translateY(-1px); }
    .item.pago  { background: var(--success-bg); border-color: #bbf7d0; }
    .item.escondido { display: none; }

    .info-pessoa {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 12px;
    }

    .lado-esquerdo { display: flex; align-items: center; gap: 10px; }

    .nome { font-size: 0.95rem; }
    .item.pago .nome { color: var(--success); font-weight: 600; }

    .status {
      font-size: 0.72rem;
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: 700;
      min-width: 88px;
      text-align: center;
    }
    .status.pago     { background: #bbf7d0; color: #065f46; }
    .status.pendente { background: #fecaca; color: #991b1b; }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #22c55e;
      cursor: pointer;
      flex-shrink: 0;
    }

    .muted { color: var(--muted); font-size: 0.8rem; margin-top: 12px; }

    #syncAviso {
      padding: 10px 14px;
      background: #fef9c3;
      color: #854d0e;
      border: 1px solid #fde68a;
      border-radius: 10px;
      font-size: 0.82rem;
      margin-bottom: 16px;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.1rem; }
      .item { padding: 10px 12px; }
      .status { min-width: 76px; font-size: 0.68rem; }
    }
  </style>

  <script src="auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA4jZeE9qpW50GLsjohuVDMIjOmC9Lyig0",
      authDomain: "pagamentos-b0709.firebaseapp.com",
      projectId: "pagamentos-b0709",
      storageBucket: "pagamentos-b0709.firebasestorage.app",
      messagingSenderId: "146576431226",
      appId: "1:146576431226:web:8c4f2221281c5a5a5fc3c3",
      measurementId: "G-5BF79SPNQN"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
    checkAuth();
    auth.signInAnonymously().catch(e => console.warn("Firebase Auth indisponivel:", e.message));
  </script>
</head>
<body>
  <div class="container">

    <div class="card">
      <div class="topo">
        <div>
          <h1>🎯 Controle de Pagamentos</h1>
          <div class="subtitulo">Lista mensal de cotas com sincronização em tempo real</div>
        </div>
        <button class="btn-danger" id="btnSair">Sair</button>
      </div>
    </div>

    <div class="card">
      <input type="text" id="busca" class="busca" placeholder="Buscar nome..." />
    </div>

    <div class="card">
      <div class="resumo">
        <div class="box">
          <div class="titulo">Mes</div>
          <div class="valor" id="mesReferenciaTela">--</div>
        </div>
        <div class="box pagos">
          <div class="titulo">Pagos</div>
          <div class="valor" id="totalPagos">0</div>
        </div>
        <div class="box pendentes">
          <div class="titulo">Pendentes</div>
          <div class="valor" id="totalPendentes">0</div>
        </div>
        <div class="box">
          <div class="titulo">Total arrecadado</div>
          <div class="valor" id="totalArrecadado">R$ 0,00</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div id="lista" class="lista"></div>
      <div class="muted">Pessoas com pagamento fixo ficam marcadas automaticamente.</div>
    </div>

    <div class="card">
      <button class="btn-primary" id="btnCopiar" style="width:100%;padding:14px;font-size:1rem;">
        📋 Copiar para WhatsApp
      </button>
    </div>

  </div>

  <script>
  const VALOR_COTA = 19.60;
  const hoje       = new Date();
  const MES_ATUAL  = hoje.getFullYear() + "-" + String(hoje.getMonth() + 1).padStart(2, "0");

  let MES_REFERENCIA = MES_ATUAL;
  let ESTADO_ATUAL   = {};
  let SYNC_ATIVO     = true;
  let listenerUnsub  = null;
  let intervalIdSync = null;
  let intervalIdAuth = null;
  let ultimoSyncEmMs = 0;

  const nomes = [
    "Alexsandro Teles","Aline Goes","Ana Paula Ribeiro","Andréia Dias","Angelo Miranda",
    "Celina Rosa","Cilene Queiroz","Cláudio Matos","Dailza Araújo","Diego Barbosa",
    "Editânia","Eduardo Oliveira","Emilson Barbosa","Evanice Santos",
    "Fabiano Souza","Fátima Carvalho","Gersenildo França","Graça Teixeira",
    "Helena Argolo","Isabela Santana","Ivana Guimarães","Jacira Miranda",
    "Jadson Miranda","Jaílson Souza","Janmily Mendes","Joseane Oliveira",
    "Juliana Oliveira","Leandro Nascimento","Lúcia Argolo",
    "Luciene Oliveira","Manoel Messias","Manuela Rios","Marco Costa",
    "Maria Espinheira","Mauro Kleber","Mônica Mota","Mônica Pereira",
    "Patrícia Reis","Reijane Silva","Rodrigo Müller","Rosa Oliveira","Rose Santana",
    "Simone Cunha","Sueli Ramos","Suely Santos","Tatiana Nascimento",
    "Vânia Carvalho","Vilma Gravata","Vilma Patrícia","Wilson Dias"
  ];

  const PAGAMENTOS_FIXOS = { "Jacira Miranda": "2026-12" };

  const lista               = document.getElementById("lista");
  const busca               = document.getElementById("busca");
  const btnCopiar           = document.getElementById("btnCopiar");
  const btnSair             = document.getElementById("btnSair");
  const totalPagosEl        = document.getElementById("totalPagos");
  const totalPendentesEl    = document.getElementById("totalPendentes");
  const totalArrecadadoEl   = document.getElementById("totalArrecadado");
  const mesReferenciaTelaEl = document.getElementById("mesReferenciaTela");

  function nomeMesReferencia(ref) {
    const [a, m] = ref.split("-");
    return new Date(Number(a), Number(m) - 1, 1)
      .toLocaleString("pt-BR", { month: "long", year: "numeric" })
      .toUpperCase();
  }

  function numeroMesReferencia(ref) {
    return String(Number(ref.split("-")[1])).padStart(2, "0");
  }

  function formatarMoeda(v) {
    return v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  }

  function erroPermissao(e) {
    if (!e) return false;
    if (e.code === "permission-denied") return true;
    return String(e.message || "").toLowerCase().includes("insufficient permissions");
  }

  function desativarSync(e) {
    if (!SYNC_ATIVO) return;
    SYNC_ATIVO = false;
    if (typeof listenerUnsub === "function") { listenerUnsub(); listenerUnsub = null; }
    if (intervalIdSync) { clearInterval(intervalIdSync); intervalIdSync = null; }
    console.warn("Sync desativado por falta de permissao:", e);
    let aviso = document.getElementById("syncAviso");
    if (!aviso) {
      aviso = document.createElement("div");
      aviso.id = "syncAviso";
      document.querySelector(".container").insertBefore(aviso, document.querySelector(".container").firstChild);
    }
    aviso.textContent = "Sem permissao no Firestore. App em modo local. Habilite Anonymous Auth no Firebase Console.";
  }

  function podeSincronizar() {
    return SYNC_ATIVO && !!auth.currentUser;
  }

  function criarLista() {
    lista.innerHTML = "";
    nomes.forEach(nome => {
      const item = document.createElement("div");
      item.className = "item";
      item.dataset.nome = nome.toLowerCase();

      const info = document.createElement("div");
      info.className = "info-pessoa";

      const lado = document.createElement("div");
      lado.className = "lado-esquerdo";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.dataset.nome = nome;
      cb.addEventListener("change", salvarEstado);

      const nomeEl = document.createElement("span");
      nomeEl.className = "nome";
      nomeEl.textContent = nome;

      lado.appendChild(cb);
      lado.appendChild(nomeEl);

      const status = document.createElement("span");
      status.className = "status pendente";
      status.textContent = "PENDENTE";

      info.appendChild(lado);
      info.appendChild(status);
      item.appendChild(info);
      lista.appendChild(item);
    });
  }

  function atualizarResumo() {
    const cbs   = [...document.querySelectorAll('input[type="checkbox"]')];
    const pagos = cbs.filter(c => c.checked).length;
    totalPagosEl.textContent        = pagos;
    totalPendentesEl.textContent    = cbs.length - pagos;
    totalArrecadadoEl.textContent   = formatarMoeda(pagos * VALOR_COTA);
    mesReferenciaTelaEl.textContent = nomeMesReferencia(MES_REFERENCIA);
  }

  function aplicarEstado() {
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      const nome   = cb.dataset.nome;
      const item   = cb.closest(".item");
      const nomeEl = item.querySelector(".nome");
      const status = item.querySelector(".status");
      const fixo   = PAGAMENTOS_FIXOS[nome] && MES_REFERENCIA <= PAGAMENTOS_FIXOS[nome];

      if (fixo) { cb.checked = true; cb.disabled = true; }
      else       { cb.disabled = false; cb.checked = !!ESTADO_ATUAL[nome]; }

      if (cb.checked) {
        item.classList.add("pago"); nomeEl.classList.add("pago");
        status.className = "status pago"; status.textContent = "PAGO";
      } else {
        item.classList.remove("pago"); nomeEl.classList.remove("pago");
        status.className = "status pendente"; status.textContent = "PENDENTE";
      }
    });
    atualizarResumo();
    aplicarBusca();
  }

  async function carregarDoServidor() {
    if (!podeSincronizar()) { aplicarEstado(); return; }
    try {
      const snap = await db.collection("pagamentosControle").doc("ultimo").get();
      if (snap.exists) {
        const d = snap.data();
        MES_REFERENCIA = d?.mes    || MES_ATUAL;
        ESTADO_ATUAL   = d?.estado || {};
      } else {
        MES_REFERENCIA = MES_ATUAL; ESTADO_ATUAL = {};
      }
      ultimoSyncEmMs = Date.now();
      aplicarEstado();
    } catch (e) {
      if (erroPermissao(e)) { desativarSync(e); return; }
      console.error("Erro ao carregar:", e);
    }
  }

  async function salvarEstado() {
    const estado = {};
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      if (!cb.disabled) estado[cb.dataset.nome] = cb.checked;
    });
    ESTADO_ATUAL = estado;
    aplicarEstado();
    if (!podeSincronizar()) return;
    try {
      await db.collection("pagamentosControle").doc("ultimo").set({ mes: MES_REFERENCIA, estado: ESTADO_ATUAL });
      ultimoSyncEmMs = Date.now();
    } catch (e) {
      if (erroPermissao(e)) { desativarSync(e); return; }
      console.error("Erro ao salvar:", e);
    }
  }

  function iniciarListenerTempoReal() {
    if (!podeSincronizar()) return;
    if (typeof listenerUnsub === "function") listenerUnsub();
    listenerUnsub = db.collection("pagamentosControle").doc("ultimo").onSnapshot(snap => {
      if (snap.exists) {
        const d = snap.data();
        MES_REFERENCIA = d?.mes    || MES_ATUAL;
        ESTADO_ATUAL   = d?.estado || {};
      } else { MES_REFERENCIA = MES_ATUAL; ESTADO_ATUAL = {}; }
      ultimoSyncEmMs = Date.now();
      aplicarEstado();
    }, e => {
      if (erroPermissao(e)) { desativarSync(e); return; }
      console.error("Erro no listener:", e);
    });
  }

  function iniciarPollingSync() {
    if (intervalIdSync) clearInterval(intervalIdSync);
    intervalIdSync = setInterval(() => {
      if (!SYNC_ATIVO) return;
      // Retry auth in background for browsers that drop auth state on mobile.
      if (!auth.currentUser) {
        auth.signInAnonymously().catch(() => {});
        return;
      }
      const semSyncRecente = Date.now() - ultimoSyncEmMs > 8000;
      if (semSyncRecente) carregarDoServidor();
    }, 3000);
  }

  function iniciarAuthRetry() {
    if (intervalIdAuth) clearInterval(intervalIdAuth);
    intervalIdAuth = setInterval(() => {
      if (!SYNC_ATIVO || auth.currentUser) return;
      auth.signInAnonymously().catch(() => {});
    }, 10000);
  }

  function aplicarBusca() {
    const termo = busca.value.trim().toLowerCase();
    document.querySelectorAll(".item").forEach(item => {
      item.classList.toggle("escondido", !item.dataset.nome.includes(termo));
    });
  }

  async function copiarResultados() {
    const pagos = [], pendentes = [];
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      (cb.checked ? pagos : pendentes).push(cb.dataset.nome);
    });
    const usarArroba      = pendentes.length <= 10;
    const totalArrecadado = (pagos.length * VALOR_COTA).toFixed(2).replace(".", ",");
    const NOME_MES        = nomeMesReferencia(MES_REFERENCIA);
    const MES_NUMERO      = numeroMesReferencia(MES_REFERENCIA);

    let texto =
`🎯 *COTA MENSAL – MEGA-SENA + LOTOFÁCIL*

💰 *VALOR:* R$ 19,60
📅 *MÊS:* ${NOME_MES}
⏰ *PAGAMENTO ATÉ:* 09/${MES_NUMERO}

🔑 *PIX:* 71999989616

🎰 01 Jogo de *09 dezenas* na *Mega-Sena*
🎰 01 Jogo de *17 dezenas* na *Lotofácil*

━━━━━━━━━━━━━━
✅ *COTAS PAGAS:* ${pagos.length}
💵 *TOTAL ARRECADADO:* R$ ${totalArrecadado}
━━━━━━━━━━━━━━

📋 *PAGOS*
`;
    pagos.forEach((n, i) => { texto += `${String(i+1).padStart(2,"0")} - ${n} - *PG*\n`; });
    if (pendentes.length > 0) {
      texto += `\n⚠️ *COTAS PENDENTES:* ${pendentes.length}\n`;
      if (usarArroba) texto += "👇 *ATENÇÃO*\n";
      pendentes.forEach(n => { texto += usarArroba ? `@${n}\n` : `${n}\n`; });
    }
    try {
      await navigator.clipboard.writeText(texto);
      alert("Texto copiado para o WhatsApp ✅");
    } catch (e) { alert("Não foi possível copiar o texto."); }
  }

  busca.addEventListener("input", aplicarBusca);
  btnCopiar.addEventListener("click", copiarResultados);
  btnSair.addEventListener("click", () => { if (typeof logout === "function") logout(); });
  document.addEventListener("visibilitychange", () => { if (!document.hidden && SYNC_ATIVO) carregarDoServidor(); });
  window.addEventListener("focus", () => { if (SYNC_ATIVO) carregarDoServidor(); });

  criarLista();
  aplicarEstado();

  firebase.auth().onAuthStateChanged(user => {
    if (!user) return;
    carregarDoServidor();
    iniciarListenerTempoReal();
    iniciarPollingSync();
  });

  iniciarAuthRetry();
  </script>
</body>
</html>
