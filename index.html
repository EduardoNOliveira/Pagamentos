<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Pagamentos</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 15px;
}
.pago { color: green; }
.pendente { color: red; }
label { display: block; margin: 4px 0; }
button {
  margin: 10px 5px 0 0;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- 🔒 LOGIN -->
<script src="auth.js"></script>
<script>checkAuth()</script>

<h2>Controle de Pagamentos</h2>
<button onclick="logout()">Sair</button>

<hr>

<ul id="listaPagamentos"></ul>

<p>
COTAS PAGAS: <strong><span id="cotasPagas">00</span></strong><br>
TOTAL ARRECADADO: <strong>R$ <span id="totalArrecadado">0,00</span></strong>
</p>

<p id="mensagemCotasPendentes"></p>
<ul id="listaPendentes"></ul>

<button onclick="copiarResultados()">📋 Copiar para WhatsApp</button>

<hr>

<div id="checkboxes"></div>

<script>
// ================= CONFIG =================
const VALOR_COTA = 19.6;

// nomes embutidos
const nomes = [
"Alexsandro Teles","Aline Goes","Ana Paula Ribeiro","Andréia Dias","Angelo Miranda",
"Celina Rosa","Cilene Queiroz","Cláudio Matos","Dailza Araújo","Diego Barbosa",
"Editânia","Eduardo Oliveira","Emilson Barbosa","Evanice Santos",
"Fabiano Souza","Fátima Carvalho","Gersenildo França","Graça Teixeira",
"Helena Argolo","Isabela Santana","Ivana Guimarães","Jacira Miranda",
"Jadson Miranda","Jaílson Souza","Janmily Mendes","Joseane Oliveira",
"Juliana Oliveira","Leandro Nascimento","Lúcia Argolo","Luciana Falcão",
"Luciene Oliveira","Manoel Messias","Manuela Rios","Marco Costa",
"Maria Espinheira","Mauro Kleber","Mônica Mota","Mônica Pereira",
"Patrícia Reis","Reijane Silva","Renata Conceíção","Rodrigo Müller","Rose Santana",
"Simone Cunha","Sueli Ramos","Suely Santos","Tatiana Nascimento",
"Vânia Carvalho","Vilma Gravata","Vilma Patrícia","Wilson Dias"
];

// ================= MÊS AUTOMÁTICO =================
const hoje = new Date();
const MES_ATUAL = hoje.getFullYear() + "-" + String(hoje.getMonth()+1).padStart(2,"0");
const STORAGE_KEY = "pagamentos_" + MES_ATUAL;

// ================= CHECKBOXES =================
const divCheckboxes = document.getElementById("checkboxes");

nomes.forEach(nome => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" data-nome="${nome}"> ${nome}`;
  divCheckboxes.appendChild(label);
});

function salvarEstado() {
  const estado = {};
  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    estado[cb.dataset.nome] = cb.checked;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
}

function carregarEstado() {
  const estado = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.checked = estado[cb.dataset.nome] || false;
  });
}

document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
  cb.addEventListener("change", atualizarListas);
});

// ================= ATUALIZAR LISTAS =================
function atualizarListas() {
  const listaPagos = document.getElementById("listaPagamentos");
  const listaPend = document.getElementById("listaPendentes");

  listaPagos.innerHTML = "";
  listaPend.innerHTML = "";

  let cont = 0;

  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    if (cb.checked) {
      cont++;
      const li = document.createElement("li");
      li.className = "pago";
      li.textContent = String(cont).padStart(2,"0")+" - "+cb.dataset.nome+" - *PG*";
      listaPagos.appendChild(li);
    } else {
      const li = document.createElement("li");
      li.className = "pendente";
      li.textContent = cb.dataset.nome;
      listaPend.appendChild(li);
    }
  });

  document.getElementById("cotasPagas").textContent = cont;
  document.getElementById("totalArrecadado").textContent =
    (cont * VALOR_COTA).toFixed(2).replace(".",",");

  document.getElementById("mensagemCotasPendentes").textContent =
    "COTAS PENDENTES: " + (nomes.length - cont);

  salvarEstado();
}

// ================= WHATSAPP =================
function copiarResultados() {
  const mesNome = hoje.toLocaleString("pt-br",{month:"long"}).toUpperCase();
  const mesNum = String(hoje.getMonth()+1).padStart(2,"0");

  const pagos = document.getElementById("listaPagamentos").children;
  const pend = document.getElementById("listaPendentes").children;

  const cotasPagas = pagos.length;
  const pendentes = nomes.length - cotasPagas;
  const usarArroba = pendentes <= 10;

  let txt = 
`🎯 *COTA MENSAL – MEGA-SENA + LOTOFÁCIL*

💰 *VALOR:* R$ 19,60
📅 *MÊS:* ${mesNome}
⏰ *PAGAMENTO ATÉ:* 09/${mesNum}

🔑 *PIX:* 71999989616

🎰 01 Jogo de *09 dezenas* na *Mega-Sena*
🎰 01 Jogo de *17 dezenas* na *Lotofácil*

━━━━━━━━━━━━━━
✅ *COTAS PAGAS:* ${cotasPagas}
💵 *TOTAL ARRECADADO:* R$ ${(cotasPagas*VALOR_COTA).toFixed(2).replace(".",",")}
━━━━━━━━━━━━━━

📋 *PAGOS*
`;

  for (let i=0;i<pagos.length;i++) {
    txt += pagos[i].textContent+"\n";
  }

  txt += `\n⚠️ *COTAS PENDENTES:* ${pendentes}\n`;

  if (pendentes > 0 && usarArroba) txt += "👇 *ATENÇÃO*\n";

  for (let j=0;j<pend.length;j++) {
    txt += usarArroba ? "@"+pend[j].textContent+"\n" : pend[j].textContent+"\n";
  }

  navigator.clipboard.writeText(txt);
  alert("Mensagem copiada para o WhatsApp");
}

// ================= START =================
carregarEstado();
atualizarListas();
</script>

</body>
</html>
