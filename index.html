<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Pagamentos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    padding: 15px;
}
.pago { color: green; }
.pendente { color: red; }
button {
    margin: 10px 5px 0 0;
    padding: 10px;
    font-size: 16px;
}
label {
    display: block;
}
</style>
</head>

<body>

<script>
// 🔒 LOGIN OBRIGATÓRIO
if (localStorage.getItem("logado") !== "sim") {
    location.href = "login.html";
}
</script>

<h2>Controle de Pagamentos</h2>

<pre id="infoPagamento"></pre>

<hr>

<h3>Pagos</h3>
<ul id="listaPagos"></ul>

<p><strong>COTAS PAGAS:</strong> <span id="qtdPagos">00</span></p>
<p><strong>TOTAL ARRECADADO:</strong> R$ <span id="total">0,00</span></p>

<h3 id="tituloPendentes"></h3>
<ul id="listaPendentes"></ul>

<hr>

<h3>Marcar Pagamentos</h3>
<div id="checkboxes"></div>

<button onclick="copiarResultados()">📋 Copiar para WhatsApp</button>
<button onclick="logout()">🚪 Sair</button>

<script>
// ================= CONFIGURAÇÕES =================
const VALOR_COTA = 19.60;
const PIX = "71999989616";

const hoje = new Date();
const mesAtual = hoje.toISOString().slice(0, 7); // YYYY-MM
const mesNome = hoje.toLocaleString('pt-br', { month: 'long' });
const mesNumero = hoje.toLocaleString('pt-br', { month: '2-digit' });

// ================= LISTA COMPLETA =================
const nomes = [
"Alexsandro Teles","Aline Goes","Ana Paula Ribeiro","Andréia Dias","Angelo Miranda",
"Celina Rosa","Cilene Queiroz","Cláudio Matos","Dailza Araújo","Diego Barbosa",
"Editânia","Eduardo Oliveira","Emilson Barbosa","Evanice Santos",
"Fabiano Souza","Fátima Carvalho","Gersenildo França","Graça Teixeira",
"Helena Argolo","Isabela Santana","Ivana Guimarães","Jacira Miranda",
"Jadson Miranda","Jaílson Souza","Janmily Mendes","Joseane Oliveira",
"Juliana Oliveira","Leandro Nascimento","Lúcia Argolo","Luciana Falcão",
"Luciene Oliveira","Manoel Messias","Manuela Rios","Marco Costa",
"Maria Espinheira","Mauro Kleber","Mônica Mota","Mônica Pereira",
"Patrícia Reis","Reijane Silva","Renata Conceíção","Rodrigo Müller","Rose Santana",
"Simone Cunha","Sueli Ramos","Suely Santos","Tatiana Nascimento",
"Vânia Carvalho","Vilma Gravata","Vilma Patrícia","Wilson Dias"
];

const dados = nomes.map(nome => ({
    nome: nome,
    whatsapp: "@" + nome
}));

// ================= PAGAMENTO FIXO =================
const pagosAte = {
    "Jacira Miranda": "2026-12"
};

// ================= STORAGE =================
function carregarPagamentos() {
    return JSON.parse(localStorage.getItem("pagamentos") || "{}");
}

function salvarPagamentos(p) {
    localStorage.setItem("pagamentos", JSON.stringify(p));
}

// ================= REGRAS =================
function estaPago(nome) {
    if (pagosAte[nome] && pagosAte[nome] >= mesAtual) return true;
    const p = carregarPagamentos();
    return p[nome]?.[mesAtual] === true;
}

function togglePagamento(nome, checked) {
    const p = carregarPagamentos();
    if (!p[nome]) p[nome] = {};
    p[nome][mesAtual] = checked;
    salvarPagamentos(p);
    atualizar();
}

// ================= ATUALIZA TELA =================
function atualizar() {
    const listaPagos = document.getElementById("listaPagos");
    const listaPendentes = document.getElementById("listaPendentes");
    const qtdPagos = document.getElementById("qtdPagos");
    const total = document.getElementById("total");
    const tituloPendentes = document.getElementById("tituloPendentes");

    listaPagos.innerHTML = "";
    listaPendentes.innerHTML = "";

    let pagos = 0;
    let pendentes = [];

    dados.forEach(pessoa => {
        if (estaPago(pessoa.nome)) {
            pagos++;
            const li = document.createElement("li");
            li.className = "pago";
            li.textContent = `${String(pagos).padStart(2,"0")} - ${pessoa.nome} - *PG*`;
            listaPagos.appendChild(li);
        } else {
            pendentes.push(pessoa.whatsapp);
        }
    });

    qtdPagos.textContent = String(pagos).padStart(2,"0");
    total.textContent = (pagos * VALOR_COTA).toFixed(2).replace(".", ",");

    if (pendentes.length) {
        tituloPendentes.textContent = "COTAS PENDENTES:";
        pendentes.forEach(p => {
            const li = document.createElement("li");
            li.className = "pendente";
            li.textContent = p;
            listaPendentes.appendChild(li);
        });
    } else {
        tituloPendentes.textContent = "";
    }
}

// ================= COPIAR WHATSAPP =================
function copiarResultados() {
let texto =
`*VALOR DA CONTA MENSAL: R$ 19,60* - Para o mês de ${mesNome}

*PAGAMENTO ACEITO ATÉ O DIA 09/${mesNumero}*
*PIX:* ${PIX}
01 Jogo de 09 dezenas na Mega Sena e 01 jogo de 17 dezenas na Lotofácil

`;

let pagos = 0;
let pendentes = [];

dados.forEach(pessoa => {
    if (estaPago(pessoa.nome)) {
        pagos++;
        texto += `${String(pagos).padStart(2,"0")} - ${pessoa.nome} - *PG*\n`;
    } else {
        pendentes.push(pessoa.whatsapp);
    }
});

texto += `\n*COTAS PAGAS:* ${pagos}`;
texto += `\n*TOTAL ARRECADADO:* R$ ${(pagos * VALOR_COTA).toFixed(2).replace(".", ",")}\n`;

if (pendentes.length) {
    texto += `\n*COTAS PENDENTES:*\n`;
    pendentes.forEach(p => texto += `${p}\n`);
}

navigator.clipboard.writeText(texto);
alert("Texto copiado no padrão WhatsApp ✔️");
}

// ================= LOGOUT =================
function logout() {
    localStorage.removeItem("logado");
    location.href = "login.html";
}

// ================= CHECKBOXES =================
const div = document.getElementById("checkboxes");

dados.forEach(pessoa => {
    const label = document.createElement("label");
    const cb = document.createElement("input");

    cb.type = "checkbox";
    cb.checked = estaPago(pessoa.nome);
    cb.onchange = () => togglePagamento(pessoa.nome, cb.checked);

    label.appendChild(cb);
    label.append(" " + pessoa.nome);

    div.appendChild(label);
});

// ================= TEXTO FIXO VISUAL =================
document.getElementById("infoPagamento").innerText =
`VALOR DA CONTA MENSAL: R$ 19,60 - Para o mês de ${mesNome}
PAGAMENTO ACEITO ATÉ O DIA 09/${mesNumero}
PIX: ${PIX}
01 Jogo de 09 dezenas na Mega Sena e 01 jogo de 17 dezenas na Lotofácil`;

atualizar();
</script>

</body>
</html>
