<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamentos</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-auth.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function carregarDoServidor() {
            // Fetch the checkbox state from the database
            const checkboxesRef = database.ref('checkboxes');
            checkboxesRef.on('value', (snapshot) => {
                const checkboxes = snapshot.val();
                for (const key in checkboxes) {
                    document.getElementById(key).checked = checkboxes[key];
                }
            });
        }

        function atualizarServidor(checkbox) {
            const checkboxesRef = database.ref('checkboxes');
            checkboxesRef.child(checkbox.id).set(checkbox.checked);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', () => atualizarServidor(checkbox));
            });
            carregarDoServidor();  // Load checkbox state initially
        });
    </script>
</head>
<body>
    <h1>Pagamentos</h1>
    <label><input id="checkbox1" type="checkbox"> Checkbox 1</label><br>
    <label><input id="checkbox2" type="checkbox"> Checkbox 2</label><br>
    <label><input id="checkbox3" type="checkbox"> Checkbox 3</label><br>
    <label><input id="checkbox4" type="checkbox"> Checkbox 4</label><br>
    <label><input id="checkbox5" type="checkbox"> Checkbox 5</label><br>
</body>
</html>
