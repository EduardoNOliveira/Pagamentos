<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Pagamentos</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 15px;
}
label {
  display: block;
  margin: 4px 0;
}
.pago {
  color: green;
  font-weight: bold;
}
button {
  margin-top: 20px;
  padding: 12px;
  font-size: 16px;
  width: 100%;
}
</style>

<script src="auth.js"></script>
<script>
checkAuth();
</script>
</head>

<body>

<button onclick="logout()">Sair</button>

<h2>Controle de Pagamentos</h2>

<script>
// ================= DATA / MÊS =================
const hoje = new Date();
const MES_ATUAL = hoje.getFullYear() + "-" + String(hoje.getMonth() + 1).padStart(2, "0");
const NOME_MES = hoje.toLocaleString("pt-br", { month: "long" }).toUpperCase();
const STORAGE_KEY = "pagamentos_" + MES_ATUAL;

// ================= NOMES =================
const nomes = [
"Alexsandro Teles","Aline Goes","Ana Paula Ribeiro","Andréia Dias","Angelo Miranda",
"Celina Rosa","Cilene Queiroz","Cláudio Matos","Dailza Araújo","Diego Barbosa",
"Editânia","Eduardo Oliveira","Emilson Barbosa","Evanice Santos",
"Fabiano Souza","Fátima Carvalho","Gersenildo França","Graça Teixeira",
"Helena Argolo","Isabela Santana","Ivana Guimarães","Jacira Miranda",
"Jadson Miranda","Jaílson Souza","Janmily Mendes","Joseane Oliveira",
"Juliana Oliveira","Leandro Nascimento","Lúcia Argolo",
"Luciene Oliveira","Manoel Messias","Manuela Rios","Marco Costa",
"Maria Espinheira","Mauro Kleber","Mônica Mota","Mônica Pereira",
"Patrícia Reis","Reijane Silva","Renata Conceição","Rodrigo Müller","Rose Santana",
"Simone Cunha","Sueli Ramos","Suely Santos","Tatiana Nascimento",
"Vânia Carvalho","Vilma Gravata","Vilma Patrícia","Wilson Dias"
];

// ================= PAGAMENTOS FIXOS =================
const PAGAMENTOS_FIXOS = {
  "Jacira Miranda": "2026-12"
};

// ================= LISTA =================
const divLista = document.createElement("div");

nomes.forEach(nome => {
  const label = document.createElement("label");
  const cb = document.createElement("input");

  cb.type = "checkbox";
  cb.dataset.nome = nome;
  cb.onchange = salvarEstado;

  label.appendChild(cb);
  label.append(" " + nome);
  divLista.appendChild(label);
});

document.body.appendChild(divLista);

// ================= ESTADO =================
function salvarEstado() {
  const estado = {};
  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    if (!cb.disabled) estado[cb.dataset.nome] = cb.checked;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
}

function carregarEstado() {
  const estado = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    const nome = cb.dataset.nome;

    if (PAGAMENTOS_FIXOS[nome] && MES_ATUAL <= PAGAMENTOS_FIXOS[nome]) {
      cb.checked = true;
      cb.disabled = true;
      cb.parentElement.classList.add("pago");
    } else {
      cb.checked = estado[nome] || false;
      cb.parentElement.classList.toggle("pago", cb.checked);
    }
  });
}
carregarEstado();

// ================= COPIAR WHATSAPP =================
function copiarResultados() {
  const VALOR = 19.60;
  let pagos = [];
  let pendentes = [];

  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.checked ? pagos.push(cb.dataset.nome) : pendentes.push(cb.dataset.nome);
  });

  const usarArroba = pendentes.length <= 10;
  const totalArrecadado = (pagos.length * VALOR).toFixed(2).replace(".", ",");

  let texto =
`🎯 *COTA MENSAL – MEGA-SENA + LOTOFÁCIL*

💰 *VALOR:* R$ 19,60
📅 *MÊS:* ${NOME_MES}
⏰ *PAGAMENTO ATÉ:* 09/${String(hoje.getMonth() + 1).padStart(2, "0")}

🔑 *PIX:* 71999989616

🎰 01 Jogo de *09 dezenas* na *Mega-Sena*
🎰 01 Jogo de *17 dezenas* na *Lotofácil*

━━━━━━━━━━━━━━
✅ *COTAS PAGAS:* ${pagos.length}
💵 *TOTAL ARRECADADO:* R$ ${totalArrecadado}
━━━━━━━━━━━━━━

📋 *PAGOS*
`;

  pagos.forEach((n, i) => {
    texto += `${String(i + 1).padStart(2, "0")} - ${n} - *PG*\n`;
  });

  texto += `\n⚠️ *COTAS PENDENTES:* ${pendentes.length}\n`;
  if (usarArroba) texto += "👇 *ATENÇÃO*\n";

  pendentes.forEach(n => {
    texto += usarArroba ? `@${n}\n` : `${n}\n`;
  });

  navigator.clipboard.writeText(texto);
  alert("Texto copiado para o WhatsApp ✅");
}
</script>

<!-- BOTÃO FINAL -->
<button onclick="copiarResultados()">Copiar para WhatsApp</button>

</body>
</html>
