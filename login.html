<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #fff;
  padding: 20px;
  border-radius: 8px;
  width: 100%;
  max-width: 320px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  font-size: 16px;
}

button {
  background: #333;
  color: #fff;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
<h3>Login</h3>

<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">

<button onclick="entrar()">Entrar</button>

<p id="msg"></p>
</div>

<script>
function hash(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

function entrar() {
  const u = document.getElementById('user').value.trim();
  const p = document.getElementById('pass').value;

  if (!u || !p) {
    msg('Preencha usuário e senha');
    return;
  }

  const hashPass = hash(p);

  const userSalvo = localStorage.getItem('auth_user');
  const hashSalvo = localStorage.getItem('auth_hash');

  // PRIMEIRO ACESSO → CRIA USUÁRIO
  if (!userSalvo || !hashSalvo) {
    localStorage.setItem('auth_user', u);
    localStorage.setItem('auth_hash', hashPass);
    sessionStorage.setItem('auth_ok', '1');
    window.location.href = 'index.html';
    return;
  }

  // LOGIN NORMAL
  if (u === userSalvo && hashPass === hashSalvo) {
    sessionStorage.setItem('auth_ok', '1');
    window.location.href = 'index.html';
  } else {
    msg('Usuário ou senha incorretos');
  }
}

function msg(t) {
  document.getElementById('msg').textContent = t;
}
</script>

</body>
</html>
